<!--This is the page that displays when the site is coming soon-->
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Wracket</title>
    <style>
        @font-face {
            font-family: 'Freedom';
            src: url('/freedom-font/Freedom-10eM.ttf') format('truetype'),
                 url('/freedom-font/Freedom-nZ4J.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Steiner';
            src: url('/steiner-font/SteinerLight-JR1o.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            background-image: linear-gradient(rgba(86, 7, 64, 0.5), rgba(0, 0, 0, 0.35)), url(images/background.jpg);
        }

        .letter-row {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .letter-row img {
            position: relative;
            margin-left: -24px;
            transition: transform 0.2s ease;
        }

        .letter-row img:first-child {
            margin-left: 0;
        }
    </style>
</head>
<body>
    <div style="display: flex; flex-direction: column; 
    justify-content: start; align-items: center; 
    height: fit-content;;
    background-color: hsla(323, 100%, 88%, 0.75);
    margin: 60px;
    gap: 24px;
    padding: 24px;">
        <h1 style="font-family: 'Freedom', sans-serif; font-size: 1.7rem;">COMING SOON</h1>

        <div class="letter-row" alt="wracket">
            <img class="nudge-icon" src="/images/W.svg" alt="W" width="100" height="100">
            <img class="nudge-icon" src="/images/R.svg" alt="R" width="100" height="100">
            <img class="nudge-icon" src="/images/A.svg" alt="A" width="100" height="100">
            <img class="nudge-icon" src="/images/C.svg" alt="C" width="100" height="100">
            <img class="nudge-icon" src="/images/K.svg" alt="K" width="100" height="100">
            <img class="nudge-icon" src="/images/E.svg" alt="E" width="100" height="100">
            <img class="nudge-icon" src="/images/T.svg" alt="T" width="100" height="100">
        </div>
        
        <p style="font-family: 'Steiner', sans-serif; font-size: 1.2rem; font-style: italic;">For everyday art lovers</p>
    </div>
    
</body>
<script src="/nudge.js"></script>
</html>
